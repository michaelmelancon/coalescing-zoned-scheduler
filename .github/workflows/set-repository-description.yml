name: Set Repository Description

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  set-description:
    runs-on: ubuntu-latest
    permissions:
      administration: write
    steps:
      - name: Set repository description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh repo edit ${{ github.repository }} \
            --description "Persistent keyed work scheduler for stateful systems."
